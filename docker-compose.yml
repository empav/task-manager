services:
  postgres:
    image: postgres:16
    container_name: task-manager-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
